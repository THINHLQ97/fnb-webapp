services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL
      - AUTH_SECRET
      - AUTH_TRUST_HOST=true
      - AUTH_GOOGLE_ID
      - AUTH_GOOGLE_SECRET
      - KIOTVIET_BASE_URL
      - KIOTVIET_CLIENT_ID
      - KIOTVIET_CLIENT_SECRET
      - KIOTVIET_RETAILER
